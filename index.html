<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumaa Salon</title>

  <link rel="icon" href="./Lumaa%20Logo%20Fav%20Icon-%20Olive%20Green.jpg" />
  <link rel="apple-touch-icon" href="./Lumaa%20Logo%20Fav%20Icon-%20Olive%20Green.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Jost", sans-serif;
      background: #efe4d2;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      background: linear-gradient(90deg, #efe4d2 0 50%, #30392c 50% 100%);
      display: flex;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("https://images.unsplash.com/photo-1497250681960-ef046c08a56e?w=1200&q=80");
      background-size: cover;
      background-position: center;
      opacity: .16;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .poster {
      width: min(100%, 820px);
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .brand-logo {
      width: min(430px, 84vw);
      display: block;
      margin: 0 auto;
      mix-blend-mode: multiply;
    }

    .tagline {
      margin-top: 46px;
      color: #38412f;
    }

    .tagline .main {
      font-size: 1rem;
      letter-spacing: .42em;
      font-weight: 500;
    }

    .tagline .script {
      font-family: "Great Vibes", cursive;
      font-size: 3.1rem;
      color: #a77348;
    }

    .tagline .small {
      margin-top: 28px;
      font-size: .85rem;
      letter-spacing: .35em;
      line-height: 2;
      color: #776047;
    }

    .experience-box {
      width: min(94%, 720px);
      margin: 42px auto 0;
      background: rgba(49,58,42,.96);
      border: 1px solid rgba(214,177,118,.75);
      border-radius: 180px 180px 0 0;
      padding: 38px 34px 34px;
      box-shadow: 0 30px 80px rgba(0,0,0,.35);
    }

    .choose {
      color: #eee7d6;
      margin-bottom: 30px;
    }

    .choose .small {
      font-size: 1rem;
      letter-spacing: .45em;
      font-weight: 500;
    }

    .choose .big {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(4rem, 10vw, 6.6rem);
      line-height: .8;
      color: #d6b176;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px;
    }

    .card {
      position: relative;
      height: 390px;
      cursor: pointer;
      border: 1px solid rgba(214,177,118,.75);
      border-radius: 130px 130px 0 0;
      overflow: visible;
      background: #111;
    }

    .card-photo {
      height: 100%;
      overflow: hidden;
      border-radius: 130px 130px 0 0;
      position: relative;
    }

    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(.25) brightness(.58) contrast(1.08);
      display: block;
    }

    .card-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.88), transparent 62%);
    }

    .monogram {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 5;
      border: 2px solid rgba(214,177,118,.85);
      background: #fff;
    }

    .monogram img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 30px;
      z-index: 4;
      color: #fff;
    }

    .card-content h3 {
      font-family: "Cormorant Garamond", serif;
      font-size: 3.3rem;
      letter-spacing: .04em;
    }

    .card-content p {
      font-size: .9rem;
      letter-spacing: .38em;
      color: #d6b176;
    }

    .line {
      width: 70%;
      height: 1px;
      background: rgba(214,177,118,.65);
      margin: 18px auto 14px;
    }

    .view {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: .72rem;
      letter-spacing: .32em;
      color: #d6b176;
    }

    .arrow {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(214,177,118,.75);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      letter-spacing: 0;
    }

    .bottom-line {
      margin-top: 34px;
      color: #efe7d4;
    }

    .bottom-line .bold {
      font-size: .9rem;
      letter-spacing: .55em;
    }

    .bottom-line .script {
      margin-top: 8px;
      font-family: "Great Vibes", cursive;
      font-size: 2.2rem;
      color: #d6b176;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open { display: flex; }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88vh;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .overlay-bar {
      height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      color: #2f3727;
      flex-shrink: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #eee8dc;
      cursor: pointer;
      font-size: 22px;
      color: #2f3727;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 640px) {
      .page { padding: 18px 0 28px; }

      .brand-logo {
        width: 270px;
        max-width: 82vw;
      }

      .tagline { margin-top: 34px; }

      .tagline .main {
        font-size: .78rem;
        letter-spacing: .3em;
      }

      .tagline .script { font-size: 2.6rem; }

      .tagline .small {
        margin-top: 24px;
        font-size: .64rem;
        letter-spacing: .24em;
      }

      .experience-box {
        width: 92%;
        margin-top: 34px;
        padding: 32px 18px 26px;
        border-radius: 110px 110px 0 0;
      }

      .choose .small {
        font-size: .72rem;
        letter-spacing: .32em;
      }

      .choose .big { font-size: 4rem; }

      .cards { gap: 16px; }

      .card {
        height: 280px;
        border-radius: 90px 90px 0 0;
      }

      .card-photo { border-radius: 90px 90px 0 0; }

      .monogram {
        width: 48px;
        height: 48px;
        top: -23px;
      }

      .card-content { bottom: 18px; }

      .card-content h3 { font-size: 2.05rem; }

      .card-content p {
        font-size: .62rem;
        letter-spacing: .28em;
      }

      .line { margin: 12px auto 10px; }

      .view {
        font-size: .54rem;
        gap: 7px;
        letter-spacing: .18em;
      }

      .arrow {
        width: 28px;
        height: 28px;
        font-size: 1rem;
      }

      .bottom-line .bold {
        font-size: .66rem;
        letter-spacing: .35em;
      }

      .bottom-line .script { font-size: 1.7rem; }
    }
  </style>
</head>

<body>
  <section class="page">
    <div class="poster">

      <img
        src="./Lumaa%20Logo.jpg"
        alt="Lumaa Salon"
        class="brand-logo"
        onerror="this.outerHTML='<div style=&quot;color:#30392c;font-size:28px;font-weight:600;padding:30px;&quot;>Lumaa Salon<br><small>Logo not found</small></div>'"
      >

      <div class="tagline">
        <div class="main">BEAUTY. CONFIDENCE.</div>
        <div class="script">Presence.</div>
        <div class="small">
          CRAFTED EXPERIENCES<br>
          SIGNATURE TRANSFORMATIONS.
        </div>
      </div>

      <div class="experience-box">
        <div class="choose">
          <div class="small">CHOOSE YOUR</div>
          <div class="big">Experience</div>
        </div>

        <div class="cards">

          <article class="card" onclick="openPDF('men')">
            <div class="monogram">
              <img src="./Lumaa%20Logo%20Fav%20Icon-%20Olive%20Green.jpg" alt="Lumaa">
            </div>
            <div class="card-photo">
              <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=700&q=90" alt="Men Rate Card">
            </div>
            <div class="card-content">
              <h3>MEN</h3>
              <p>RATE CARD</p>
              <div class="line"></div>
              <div class="view">VIEW MENU <span class="arrow">→</span></div>
            </div>
          </article>

          <article class="card" onclick="openPDF('women')">
            <div class="monogram">
              <img src="./Lumaa%20Logo%20Fav%20Icon-%20Olive%20Green.jpg" alt="Lumaa">
            </div>
            <div class="card-photo">
              <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=700&q=90" alt="Women Rate Card">
            </div>
            <div class="card-content">
              <h3>WOMEN</h3>
              <p>RATE CARD</p>
              <div class="line"></div>
              <div class="view">VIEW MENU <span class="arrow">→</span></div>
            </div>
          </article>

        </div>

        <div class="bottom-line">
          <div class="bold">BE BOLD. BE YOU.</div>
          <div class="script">The world will adjust.</div>
        </div>
      </div>
    </div>
  </section>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Menu</span>
        <button class="close" onclick="closePDF()">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "./men.pdf", title: "Men Rate Card" },
      women: { file: "./women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function openPDF(type) {
      const pdf = pdfs[type];

      if (isIOS()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function(e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
