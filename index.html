<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumaa Salon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #eee4d2;
      --dark: #2f3727;
      --olive: #46523b;
      --gold: #b88a55;
      --soft-gold: #d6b176;
      --text: #eee7d6;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: "Jost", sans-serif;
      background: var(--cream);
    }

    body {
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      position: relative;
      background:
        linear-gradient(90deg, #efe4d2 0 50%, #2f3727 50% 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,0,0,.08), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,.08), transparent 30%),
        url("https://images.unsplash.com/photo-1497250681960-ef046c08a56e?w=1200&q=80");
      background-size: cover;
      background-position: center;
      opacity: .18;
      filter: blur(1px);
      mix-blend-mode: multiply;
    }

    .poster {
      position: relative;
      width: min(100%, 820px);
      min-height: 920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .brand {
      text-align: center;
      padding-top: 30px;
      color: var(--dark);
    }

    .brand-icon {
      width: 56px;
      height: 86px;
      border: 1px solid rgba(184,138,85,.55);
      border-radius: 50px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-size: 28px;
    }

    .brand h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(4rem, 12vw, 7.4rem);
      font-weight: 500;
      letter-spacing: .04em;
      line-height: .8;
      color: #303a2b;
    }

    .brand h2 {
      margin-top: 12px;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      letter-spacing: .55em;
      font-weight: 400;
      color: #9b7048;
    }

    .tagline {
      margin-top: 56px;
      text-align: center;
      color: #38412f;
    }

    .tagline .main {
      font-size: 1rem;
      letter-spacing: .42em;
      font-weight: 500;
    }

    .tagline .script {
      font-family: "Great Vibes", cursive;
      font-size: 3.2rem;
      color: #a77348;
      line-height: .9;
      margin-top: 4px;
    }

    .tagline .small {
      margin-top: 34px;
      font-size: .9rem;
      letter-spacing: .38em;
      line-height: 2;
      color: #776047;
    }

    .experience-box {
      width: min(94%, 720px);
      margin-top: 42px;
      background: rgba(49, 58, 42, .96);
      border: 1px solid rgba(214,177,118,.75);
      border-radius: 180px 180px 0 0;
      padding: 38px 34px 34px;
      box-shadow: 0 30px 80px rgba(0,0,0,.35);
      position: relative;
      overflow: hidden;
    }

    .experience-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), transparent 32%),
        radial-gradient(circle at 30% 90%, rgba(184,138,85,.16), transparent 35%);
      pointer-events: none;
    }

    .choose {
      position: relative;
      text-align: center;
      color: var(--text);
      margin-bottom: 26px;
    }

    .choose .small {
      font-size: 1rem;
      letter-spacing: .45em;
      font-weight: 500;
    }

    .choose .big {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(4rem, 10vw, 6.6rem);
      line-height: .8;
      color: var(--soft-gold);
      font-weight: 500;
    }

    .cards {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px;
      z-index: 2;
    }

    .card {
      position: relative;
      height: 390px;
      border: 1px solid rgba(214,177,118,.75);
      border-radius: 130px 130px 0 0;
      overflow: hidden;
      cursor: pointer;
      background: #111;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.2);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(.25) brightness(.58) contrast(1.08);
      transition: transform .5s ease, filter .5s ease;
    }

    .card:hover img {
      transform: scale(1.06);
      filter: grayscale(.1) brightness(.72) contrast(1.12);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.88), transparent 60%);
    }

    .monogram {
      position: absolute;
      top: -23px;
      left: 50%;
      transform: translateX(-50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #30392c;
      border: 1px solid rgba(214,177,118,.85);
      color: var(--soft-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.7rem;
      z-index: 4;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 30px;
      text-align: center;
      color: #fff;
      z-index: 3;
    }

    .card-content h3 {
      font-family: "Cormorant Garamond", serif;
      font-size: 3.3rem;
      font-weight: 600;
      letter-spacing: .04em;
    }

    .card-content p {
      font-size: .95rem;
      letter-spacing: .38em;
      color: var(--soft-gold);
      margin-top: 4px;
    }

    .line {
      width: 70%;
      height: 1px;
      background: rgba(214,177,118,.65);
      margin: 18px auto 14px;
      position: relative;
    }

    .line::after {
      content: "✦";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: transparent;
      color: var(--soft-gold);
      font-size: .8rem;
    }

    .view {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font-size: .75rem;
      letter-spacing: .38em;
      color: var(--soft-gold);
    }

    .arrow {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(214,177,118,.75);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      letter-spacing: 0;
    }

    .bottom-line {
      position: relative;
      text-align: center;
      margin-top: 34px;
      color: #efe7d4;
      z-index: 2;
    }

    .bottom-line .bold {
      font-size: .95rem;
      letter-spacing: .55em;
    }

    .bottom-line .script {
      margin-top: 8px;
      font-family: "Great Vibes", cursive;
      font-size: 2.2rem;
      color: var(--soft-gold);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88vh;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .overlay-bar {
      height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      color: #2f3727;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #eee8dc;
      cursor: pointer;
      font-size: 22px;
      color: #2f3727;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 640px) {
      .page {
        padding: 0;
        align-items: flex-start;
      }

      .poster {
        width: 100%;
        min-height: 100vh;
        padding: 14px 0 28px;
      }

      .brand h1 {
        font-size: 4.6rem;
      }

      .brand h2 {
        font-size: 1rem;
        letter-spacing: .45em;
      }

      .tagline {
        margin-top: 36px;
      }

      .tagline .small {
        font-size: .68rem;
        letter-spacing: .28em;
      }

      .experience-box {
        width: 92%;
        margin-top: 34px;
        padding: 32px 18px 26px;
        border-radius: 110px 110px 0 0;
      }

      .choose .small {
        font-size: .75rem;
        letter-spacing: .34em;
      }

      .choose .big {
        font-size: 4.2rem;
      }

      .cards {
        gap: 16px;
      }

      .card {
        height: 280px;
        border-radius: 90px 90px 0 0;
      }

      .card-content {
        bottom: 20px;
      }

      .card-content h3 {
        font-size: 2.1rem;
      }

      .card-content p {
        font-size: .66rem;
        letter-spacing: .3em;
      }

      .view {
        font-size: .58rem;
        gap: 8px;
        letter-spacing: .22em;
      }

      .arrow {
        width: 28px;
        height: 28px;
        font-size: 1rem;
      }

      .bottom-line .bold {
        font-size: .7rem;
        letter-spacing: .4em;
      }

      .bottom-line .script {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>
  <section class="page">
    <div class="poster">

      <div class="brand">
        <div class="brand-icon">☘</div>
        <h1>Lumaa</h1>
        <h2>SALON</h2>
      </div>

      <div class="tagline">
        <div class="main">BEAUTY. CONFIDENCE.</div>
        <div class="script">Presence.</div>
        <div class="small">
          CRAFTED EXPERIENCES<br>
          SIGNATURE TRANSFORMATIONS.
        </div>
      </div>

      <div class="experience-box">
        <div class="choose">
          <div class="small">CHOOSE YOUR</div>
          <div class="big">Experience</div>
        </div>

        <div class="cards">
          <article class="card" onclick="openPDF('men')">
            <div class="monogram">ls</div>
            <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=700&q=90" alt="Men Rate Card">
            <div class="card-content">
              <h3>MEN</h3>
              <p>RATE CARD</p>
              <div class="line"></div>
              <div class="view">VIEW MENU <span class="arrow">→</span></div>
            </div>
          </article>

          <article class="card" onclick="openPDF('women')">
            <div class="monogram">ls</div>
            <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=700&q=90" alt="Women Rate Card">
            <div class="card-content">
              <h3>WOMEN</h3>
              <p>RATE CARD</p>
              <div class="line"></div>
              <div class="view">VIEW MENU <span class="arrow">→</span></div>
            </div>
          </article>
        </div>

        <div class="bottom-line">
          <div class="bold">BE BOLD. BE YOU.</div>
          <div class="script">The world will adjust.</div>
        </div>
      </div>

    </div>
  </section>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Menu</span>
        <button class="close" onclick="closePDF()">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: {
        file: "men.pdf",
        title: "Men Rate Card"
      },
      women: {
        file: "women.pdf",
        title: "Women Rate Card"
      }
    };

    function openPDF(type) {
      overlayTitle.textContent = pdfs[type].title;
      pdfFrame.src = pdfs[type].file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function(e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
