<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumaa Salon</title>

  <link rel="icon" type="image/jpeg" href="Lumaa Logo Fav Icon- Olive Green.jpg">
  <link rel="apple-touch-icon" href="Lumaa Logo Fav Icon- Olive Green.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: "Jost", sans-serif;
      background: #efe4d2;
      overflow: hidden;
    }

    body {
      color: #30392c;
    }

    .page {
      width: 100%;
      height: 100svh;
      position: relative;
      background: linear-gradient(
        90deg,
        #efe4d2 0%,
        #efe4d2 50%,
        #30392c 50%,
        #30392c 100%
      );
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(8px, 2svh, 24px) 16px;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("https://images.unsplash.com/photo-1497250681960-ef046c08a56e?w=1400&q=80");
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .poster {
      position: relative;
      z-index: 2;
      width: min(100%, 820px);
      height: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .brand {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .brand-logo {
      width: min(380px, 78vw);
      max-height: clamp(80px, 18svh, 180px);
      height: auto;
      display: block;
      margin: 0 auto;
      object-fit: contain;
      mix-blend-mode: normal !important;
      filter: none !important;
      background: transparent;
    }

    .tagline {
      margin-top: clamp(10px, 2.7svh, 34px);
      color: #38412f;
    }

    .tagline-main {
      font-size: clamp(0.62rem, 1.25svh, 1rem);
      letter-spacing: clamp(0.18em, 0.75vw, 0.42em);
      font-weight: 500;
    }

    .tagline-script {
      font-family: "Great Vibes", cursive;
      font-size: clamp(1.8rem, 4.5svh, 3.1rem);
      color: #a77348;
      line-height: 1;
      margin-top: 2px;
    }

    .tagline-small {
      margin-top: clamp(8px, 2svh, 24px);
      font-size: clamp(0.52rem, 1.1svh, 0.85rem);
      letter-spacing: clamp(0.14em, 0.65vw, 0.35em);
      line-height: 1.6;
      color: #776047;
    }

    .experience-box {
      width: min(94%, 720px);
      margin: clamp(14px, 3svh, 36px) auto 0;
      background: rgba(49, 58, 42, 0.96);
      border: 1px solid rgba(214, 177, 118, 0.75);
      border-radius: clamp(80px, 15svh, 180px) clamp(80px, 15svh, 180px) 0 0;
      padding:
        clamp(22px, 3.8svh, 38px)
        clamp(14px, 4vw, 34px)
        clamp(16px, 2.8svh, 34px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      overflow: visible;
    }

    .choose {
      margin-bottom: clamp(14px, 2.6svh, 30px);
      color: #eee7d6;
    }

    .choose-small {
      font-size: clamp(0.62rem, 1.25svh, 1rem);
      letter-spacing: clamp(0.2em, 0.7vw, 0.45em);
      font-weight: 500;
    }

    .choose-big {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.6rem, 7.4svh, 6.6rem);
      line-height: 0.85;
      color: #d6b176;
      font-weight: 500;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(12px, 3vw, 34px);
    }

    .card {
      position: relative;
      height: clamp(185px, 34svh, 390px);
      cursor: pointer;
      border: 1px solid rgba(214, 177, 118, 0.75);
      border-radius: clamp(70px, 13svh, 130px) clamp(70px, 13svh, 130px) 0 0;
      background: #111;
      overflow: visible;
    }

    .card-photo {
      width: 100%;
      height: 100%;
      border-radius: clamp(70px, 13svh, 130px) clamp(70px, 13svh, 130px) 0 0;
      overflow: hidden;
      position: relative;
    }

    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0.25) brightness(0.58) contrast(1.08);
      transition: transform 0.45s ease, filter 0.45s ease;
    }

    .card:hover .card-photo img {
      transform: scale(1.06);
      filter: grayscale(0.1) brightness(0.72) contrast(1.12);
    }

    .card-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88), transparent 62%);
      pointer-events: none;
    }

    .monogram {
      position: absolute;
      top: clamp(-26px, -3svh, -18px);
      left: 50%;
      transform: translateX(-50%);
      width: clamp(42px, 7svh, 60px);
      height: clamp(42px, 7svh, 60px);
      border-radius: 50%;
      overflow: hidden;
      z-index: 5;
      border: 2px solid rgba(214, 177, 118, 0.85);
      background: #9ea37a;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    }

    .monogram img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      mix-blend-mode: normal !important;
      filter: none !important;
    }

    .card-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: clamp(14px, 2.8svh, 30px);
      z-index: 4;
      color: #fff;
      text-align: center;
      padding: 0 8px;
    }

    .card-content h3 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.75rem, 5svh, 3.3rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .card-content p {
      margin-top: 4px;
      font-size: clamp(0.52rem, 1.1svh, 0.9rem);
      letter-spacing: clamp(0.16em, 0.6vw, 0.38em);
      color: #d6b176;
    }

    .line {
      width: 70%;
      height: 1px;
      background: rgba(214,177,118,0.65);
      margin: clamp(8px, 1.6svh, 18px) auto clamp(7px, 1.4svh, 14px);
    }

    .view {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.6vw, 14px);
      font-size: clamp(0.48rem, 1svh, 0.72rem);
      letter-spacing: clamp(0.12em, 0.5vw, 0.32em);
      color: #d6b176;
      white-space: nowrap;
    }

    .arrow {
      width: clamp(24px, 4.6svh, 36px);
      height: clamp(24px, 4.6svh, 36px);
      border: 1px solid rgba(214,177,118,0.75);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.9rem, 2.4svh, 1.3rem);
      letter-spacing: 0;
      flex-shrink: 0;
    }

    .bottom-line {
      margin-top: clamp(14px, 2.5svh, 34px);
      color: #efe7d4;
      text-align: center;
    }

    .bottom-bold {
      font-size: clamp(0.54rem, 1.1svh, 0.9rem);
      letter-spacing: clamp(0.18em, 0.7vw, 0.55em);
    }

    .bottom-script {
      margin-top: 4px;
      font-family: "Great Vibes", cursive;
      font-size: clamp(1.35rem, 3.4svh, 2.2rem);
      color: #d6b176;
      line-height: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 99;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-panel {
      width: min(100%, 900px);
      height: 88svh;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .overlay-bar {
      height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      color: #2f3727;
      flex-shrink: 0;
    }

    .close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #eee8dc;
      cursor: pointer;
      font-size: 22px;
      color: #2f3727;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 640px) {
      .page {
        padding: 10px 0;
      }

      .poster {
        width: 100%;
      }

      .brand-logo {
        width: min(280px, 78vw);
        max-height: clamp(78px, 16svh, 145px);
      }

      .tagline {
        margin-top: clamp(8px, 2.2svh, 24px);
      }

      .experience-box {
        width: 92%;
      }

      .cards {
        gap: clamp(9px, 3vw, 16px);
      }

      .view {
        font-size: clamp(0.43rem, 0.95svh, 0.54rem);
      }
    }

    @media (max-height: 700px) {
      .tagline-small {
        display: none;
      }

      .tagline-script {
        font-size: clamp(1.6rem, 4svh, 2.5rem);
      }

      .experience-box {
        margin-top: clamp(10px, 2svh, 20px);
      }

      .bottom-line {
        margin-top: clamp(8px, 1.8svh, 18px);
      }
    }

    @media (max-height: 580px) {
      .tagline {
        display: none;
      }

      .brand-logo {
        max-height: 70px;
      }

      .experience-box {
        margin-top: 10px;
      }

      .card {
        height: clamp(150px, 36svh, 210px);
      }

      .bottom-line {
        display: none;
      }
    }
  </style>
</head>

<body>
  <section class="page">
    <div class="poster">

      <div class="brand">
        <img
          src="Lumaa Logo.png"
          alt="Lumaa Salon"
          class="brand-logo"
        >
      </div>

      <div class="tagline">
        <div class="tagline-main">BEAUTY. CONFIDENCE.</div>
        <div class="tagline-script">Presence.</div>
        <div class="tagline-small">
          CRAFTED EXPERIENCES<br>
          SIGNATURE TRANSFORMATIONS.
        </div>
      </div>

      <div class="experience-box">
        <div class="choose">
          <div class="choose-small">CHOOSE YOUR</div>
          <div class="choose-big">Experience</div>
        </div>

        <div class="cards">

          <article class="card" onclick="openPDF('men')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openPDF('men')">
            <div class="monogram">
              <img src="Lumaa Logo Fav Icon- Olive Green.jpg" alt="Lumaa Icon">
            </div>
            <div class="card-photo">
              <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=700&q=90" alt="Men Rate Card">
            </div>
            <div class="card-content">
              <h3>MEN</h3>
              <p>RATE CARD</p>
              <div class="line"></div>
              <div class="view">VIEW RATE CARD <span class="arrow">→</span></div>
            </div>
          </article>

          <article class="card" onclick="openPDF('women')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openPDF('women')">
            <div class="monogram">
              <img src="Lumaa Logo Fav Icon- Olive Green.jpg" alt="Lumaa Icon">
            </div>
            <div class="card-photo">
              <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=700&q=90" alt="Women Rate Card">
            </div>
            <div class="card-content">
              <h3>WOMEN</h3>
              <p>RATE CARD</p>
              <div class="line"></div>
              <div class="view">VIEW RATE CARD <span class="arrow">→</span></div>
            </div>
          </article>

        </div>

        <div class="bottom-line">
          <div class="bottom-bold">BE BOLD. BE YOU.</div>
          <div class="bottom-script">The world will adjust.</div>
        </div>
      </div>

    </div>
  </section>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-bar">
        <span id="overlayTitle">Service Rate Card</span>
        <button class="close" onclick="closePDF()">×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const pdfFrame = document.getElementById("pdfFrame");
    const overlayTitle = document.getElementById("overlayTitle");

    const pdfs = {
      men: { file: "men.pdf", title: "Men Rate Card" },
      women: { file: "women.pdf", title: "Women Rate Card" }
    };

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function openPDF(type) {
      const pdf = pdfs[type];

      if (isIOS()) {
        window.location.href = pdf.file;
        return;
      }

      overlayTitle.textContent = pdf.title;
      pdfFrame.src = pdf.file;
      overlay.classList.add("open");
    }

    function closePDF() {
      overlay.classList.remove("open");
      setTimeout(() => {
        pdfFrame.src = "";
      }, 250);
    }

    overlay.addEventListener("click", function(e) {
      if (e.target === overlay) closePDF();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePDF();
    });
  </script>
</body>
</html>
